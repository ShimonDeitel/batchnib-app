name: BatchNib
options:
  bundleIdPrefix: com.shimondeitel.penmakinglog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  BatchNib:
    type: application
    platform: iOS
    sources:
      - path: BatchNib
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.penmakinglog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: BatchNib/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  BatchNibTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BatchNibTests
      - path: BatchNib.storekit
    dependencies:
      - target: BatchNib
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.penmakinglog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  BatchNibUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BatchNibUITests
    dependencies:
      - target: BatchNib
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.penmakinglog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  BatchNib:
    build:
      targets:
        BatchNib: all
        BatchNibTests: [test]
        BatchNibUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: BatchNib.storekit
    test:
      config: Debug
      storeKitConfiguration: BatchNib.storekit
      targets:
        - BatchNibTests
        - BatchNibUITests
    archive:
      config: Release
